<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="text-primary">Mis Hogares</h1>
    <button class="btn btn-primary" (click)="agregarHogar()">
      <i class="bi bi-plus-lg"></i> Agregar Hogar
    </button>
  </div>

  <div class="row">
    <div class="col-md-4 col-lg-3 mb-4" *ngFor="let hogar of hogares">
      <div class="card h-100 shadow-sm">
        <div class="card-header" [style.background-color]="hogar.color" [style.color]="hogar.textColor">
          <div class="d-flex justify-content-between align-items-start">
            <div>
              <h5 class="card-title mb-1">{{ hogar.titulo }}</h5>
              <p class="card-subtitle mb-0 small">{{ hogar.subtitulo }}</p>
              <p class="card-id small text-muted mt-2">ID: {{ hogar.id }}</p>
            </div>
            <div class="dropdown">
              <button class="btn btn-link p-0" type="button" data-bs-toggle="dropdown" [style.color]="hogar.textColor">
                <i class="bi bi-three-dots-vertical fs-5"></i>
              </button>
              <ul class="dropdown-menu dropdown-menu-end">
                <li><a class="dropdown-item" href="#" (click)="abrirModalEditar(hogar)" data-bs-toggle="modal" data-bs-target="#editarModal"><i class="bi bi-pencil me-2"></i>Editar</a></li>
                <li><hr class="dropdown-divider"></li>
                <li><a class="dropdown-item text-danger" href="#" (click)="eliminarHogar(hogar)"><i class="bi bi-trash me-2"></i>Eliminar</a></li>
              </ul>
            </div>
          </div>
        </div>
        <div class="card-body">
          <p class="card-desc">{{ hogar.descripcion }}</p>
        </div>
        <div class="card-footer bg-transparent">
          <button class="btn w-100" (click)="entrarHogar(hogar)">
            <i class="bi bi-box-arrow-in-right"></i> Entrar
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Modal de Editar -->
<div class="modal fade" id="editarModal" tabindex="-1" aria-labelledby="editarModalLabel" aria-hidden="true" *ngIf="hogarEditando">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="editarModalLabel">✏️ Editar Hogar</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar" (click)="cerrarModal()"></button>
      </div>
      <div class="modal-body">
        <form>
          <div class="mb-3">
            <label class="form-label">Nombre del Hogar</label>
            <input type="text" class="form-control" [(ngModel)]="editTitulo" name="titulo">
          </div>
          <div class="mb-3">
            <label class="form-label">Familia / Grupo</label>
            <input type="text" class="form-control" [(ngModel)]="editSubtitulo" name="subtitulo">
          </div>
          <div class="mb-3">
            <label class="form-label">Descripción</label>
            <textarea class="form-control" [(ngModel)]="editDescripcion" name="descripcion" rows="2"></textarea>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" (click)="cerrarModal()">Cancelar</button>
        <button type="button" class="btn btn-primary" (click)="guardarEdicion()">Guardar Cambios</button>
      </div>
    </div>
  </div>
</div>

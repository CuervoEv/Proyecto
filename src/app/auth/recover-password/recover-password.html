<div class="recover-container">
  <div class="recover-card">
    <div class="recover-header">
      <i class="bi bi-shield-lock-fill"></i>
      <h1>Recuperar Contraseña</h1>
    </div>

    <div class="recover-box">
      <p>Ingresa tu correo electrónico para recibir un enlace de recuperación</p>

      <div class="error-message" *ngIf="error">
        <i class="bi bi-exclamation-triangle-fill"></i>
        <span>{{ error }}</span>
      </div>

      <div class="success-message" *ngIf="success">
        <i class="bi bi-check-circle-fill"></i>
        <span>{{ success }}</span>
      </div>

      <form (ngSubmit)="recoverPassword()">
        <div class="form-group">
          <label><i class="bi bi-envelope-fill"></i> Correo electrónico</label>
          <input type="email" [(ngModel)]="email" name="email" placeholder="tu@email.com" />
        </div>

        <button type="submit" class="recover-btn" [disabled]="loading">
          <i class="bi" [class.bi-send-fill]="!loading" [class.bi-hourglass-split]="loading"></i>
          {{ loading ? 'Enviando...' : 'Enviar enlace' }}
        </button>
      </form>

      <div class="recover-links">
        <p>¿Ya tienes cuenta?</p>
        <a routerLink="/login"><i class="bi bi-box-arrow-in-right"></i> Inicia sesión aquí</a>
        <p>¿No tienes cuenta?</p>
        <a routerLink="/register"><i class="bi bi-person-plus-fill"></i> Regístrate aquí</a>
      </div>
    </div>
  </div>
</div>

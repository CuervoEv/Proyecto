<div class="container">
  <div class="card">
    <h1>Recuperar Contraseña</h1>
    <p class="subtitle">No te preocupes, te ayudamos</p>

    <div class="box">
      <h2>Recuperación</h2>

      <input type="email" placeholder="Correo electrónico" [(ngModel)]="correo">

      <button (click)="recuperar()">Recuperar</button>

      <p class="link">
        <a routerLink="/login">Volver al login</a>
      </p>
    </div>
  </div>
</div>

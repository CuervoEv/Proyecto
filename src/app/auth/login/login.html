<div class="container">
  <div class="card">
    <h1>Administración del Hogar</h1>

    <div class="box">
      <h2>Bienvenido</h2>
      <p>Inicia sesión en tu cuenta</p>

      <input type="email" placeholder="Correo electrónico" [(ngModel)]="usuario">
      <input type="password" placeholder="Contraseña" [(ngModel)]="contrasena">

      <button 
        (click)="entrar()" 
        [disabled]="!usuario || !contrasena || loading">
        Entrar al Proyecto
      </button>

      <!-- ❌ este botón vacío puede causar problemas -->
      <!-- <button routerLink=""></button> -->

      <p class="link">
        ¿No tienes una cuenta?
        | <a routerLink="/register">Registrarse</a>
      </p>
    </div>
  </div>
</div>

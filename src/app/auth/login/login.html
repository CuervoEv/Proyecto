<div class="container">
  <div class="card">
    <div class="box">
      <h2>Bienvenido</h2>
      <p>Ingresa tus credenciales</p>

      <input type="text" placeholder="Escribe tu usuario aquí" [(ngModel)]="usuario">
      <input type="password" placeholder="Escribe tu contraseña aquí" [(ngModel)]="contrasena">

      <!-- <button (click)="entrar()">Entrar al Proyecto</button> -->

      <p class="link">
        <a routerLink="/recover">¿Olvidaste tu contraseña?</a>
      </p>
      <p class="link">
        <a routerLink="/register">¿No tienes una cuenta? Regístrate</a>
      </p>
    </div>
  </div>
</div>

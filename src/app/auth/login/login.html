<div class="container">
  <div class="card">
    <h1>Administración del Hogar</h1>

    <div class="box">
      <h2>Bienvenido</h2>
      <p>Inicia sesión en tu cuenta</p>

      <input type="email" placeholder="Correo electrónico" [(ngModel)]="correo">
      <input type="password" placeholder="Contraseña" [(ngModel)]="contrasena">

      <button (click)="ingresar()" [disabled]="loading">
        {{ loading ? 'Iniciando sesión...' : 'Iniciar Sesión' }}
      </button>

      <p *ngIf="error" class="error" style="color:red">{{ error }}</p>

      <p class="link">
        ¿No tienes una cuenta?
        | <a routerLink="/register">Registrarse</a>
      </p>
    </div>
  </div>
</div>

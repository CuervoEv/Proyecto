<div class="container">
  <div class="card">

    <h1>Registro</h1>
    <p class="subtitle">Crea tu cuenta</p>

    <div class="box">
      <h2>Nuevo Usuario</h2>

      <input type="text" placeholder="Nombre" [(ngModel)]="nombre">
      <input type="email" placeholder="Correo electrónico" [(ngModel)]="correo">
      <input type="password" placeholder="Contraseña" [(ngModel)]="password">

      <input type="text" placeholder="Teléfono" [(ngModel)]="telefono">

      <select [(ngModel)]="rol">
        <option value="">Selecciona un rol</option>
        <option value="Administrador">Administrador</option>
        <option value="Miembro">Miembro</option>
        <option value="Familiar">Familiar</option>
      </select>

      <button (click)="registrar()">📝 Registrarse</button>

      <p class="link">
        ¿Ya tienes cuenta? <a routerLink="/login">Inicia sesión</a>
      </p>
    </div>

  </div>
</div>

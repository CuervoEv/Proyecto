<div class="container">
  <div class="card">
    <h1>Administración del Hogar</h1>

    <div class="box">
      <h2>Bienvenido</h2>
      <p>Ingresa tus datos para registrarte</p>

      
      <input type="text" placeholder="Nombre" [(ngModel)]="nombre">
      <input type="text" placeholder="Segundo nombre" [(ngModel)]="segundoNombre">
      <input type="text" placeholder="Apellido" [(ngModel)]="apellido">
      <input type="text" placeholder="Segundo apellido" [(ngModel)]="segundoApellido">
      <input type="text" placeholder="Usuario" [(ngModel)]="usuario">

      <button (click)="entrar()">Registrarse</button>

      <p class="link">
          ¿Ya tienes una cuenta?
        | <a routerLink="/login">Iniciar sesión</a>
        
      </p>
    </div>
  </div>
</div>

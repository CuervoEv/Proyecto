<div class="register-container">
  <div class="register-card">
    <div class="register-header">
      <i class="bi bi-house-heart-fill"></i>
      <h1>Administración del Hogar</h1>
    </div>

    <div class="register-box">
      <h2>Crear Cuenta</h2>
      <p>Ingresa tus datos para registrarte</p>

      <!-- Mensaje de error -->
      <div class="error-message" *ngIf="error">
        <i class="bi bi-exclamation-triangle-fill"></i>
        <span>{{ error }}</span>
      </div>

      <!-- Formulario de registro -->
      <form (ngSubmit)="registrar()">
        <div class="form-row">
          <div class="form-group">
            <label>
              <i class="bi bi-person-fill"></i>
              Nombre *
            </label>
            <input 
              type="text" 
              placeholder="Tu nombre" 
              [(ngModel)]="nombre" 
              name="nombre"
              [class.error-input]="error && !nombre.trim()"
              autocomplete="given-name">
          </div>
          
          <div class="form-group">
            <label>
              <i class="bi bi-person"></i>
              Segundo nombre
            </label>
            <input 
              type="text" 
              placeholder="Segundo nombre" 
              [(ngModel)]="segundoNombre" 
              name="segundoNombre"
              autocomplete="additional-name">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>
              <i class="bi bi-person-fill"></i>
              Apellido *
            </label>
            <input 
              type="text" 
              placeholder="Tu apellido" 
              [(ngModel)]="apellido" 
              name="apellido"
              [class.error-input]="error && !apellido.trim()"
              autocomplete="family-name">
          </div>
          
          <div class="form-group">
            <label>
              <i class="bi bi-person"></i>
              Segundo apellido
            </label>
            <input 
              type="text" 
              placeholder="Segundo apellido" 
              [(ngModel)]="segundoApellido" 
              name="segundoApellido"
              autocomplete="additional-name">
          </div>
        </div>

        <div class="form-group">
          <label>
            <i class="bi bi-person-badge-fill"></i>
            Usuario *
          </label>
          <input 
            type="text" 
            placeholder="Nombre de usuario" 
            [(ngModel)]="usuario" 
            name="usuario"
            [class.error-input]="error && !usuario.trim()"
            autocomplete="username">
        </div>

        <div class="form-group">
          <label>
            <i class="bi bi-envelope-fill"></i>
            Correo electrónico *
          </label>
          <input 
            type="email" 
            placeholder="tu@email.com" 
            [(ngModel)]="email" 
            name="email"
            [class.error-input]="error && !email.trim()"
            autocomplete="email">
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>
              <i class="bi bi-lock-fill"></i>
              Contraseña *
            </label>
            <input 
              type="password" 
              placeholder="Mínimo 6 caracteres" 
              [(ngModel)]="contrasena" 
              name="contrasena"
              [class.error-input]="error && !contrasena.trim()"
              autocomplete="new-password">
            <small class="password-hint">Mínimo 6 caracteres</small>
          </div>
          
          <div class="form-group">
            <label>
              <i class="bi bi-lock-fill"></i>
              Confirmar contraseña *
            </label>
            <input 
              type="password" 
              placeholder="Repite tu contraseña" 
              [(ngModel)]="confirmarContrasena" 
              name="confirmarContrasena"
              [class.error-input]="error && confirmarContrasena !== contrasena"
              autocomplete="new-password">
          </div>
        </div>

        <button type="submit" [disabled]="loading" class="register-btn">
          <i class="bi" [class.bi-person-plus-fill]="!loading" [class.bi-hourglass-split]="loading"></i>
          {{ loading ? 'Registrando...' : 'Registrarse' }}
        </button>
      </form>

      <div class="login-link">
        <p>¿Ya tienes una cuenta?</p>
        <a routerLink="/login">
          <i class="bi bi-box-arrow-in-right"></i>
          Iniciar sesión
        </a>
      </div>
    </div>
  </div>
</div>
